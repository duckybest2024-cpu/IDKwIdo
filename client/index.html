<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>234 Player Games — Mega Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0533; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #game-container { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
    #login-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #2d0b5e 0%, #1a0533 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 24px;
    }
    #login-overlay h1 { color: #fff; font-size: 3rem; font-weight: 900; text-shadow: 0 4px 20px #9b59b6; }
    #login-overlay p  { color: #c39bd3; font-size: 1.1rem; }
    #google-btn {
      display: flex; align-items: center; gap: 12px;
      background: #fff; color: #333; border: none; border-radius: 50px;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: transform .15s;
    }
    #google-btn:hover { transform: scale(1.05); }
    #google-btn img { width: 24px; height: 24px; }
    #skip-btn {
      background: transparent; color: #9b59b6; border: 2px solid #9b59b6;
      border-radius: 50px; padding: 10px 28px; font-size: 1rem; cursor: pointer;
      transition: all .15s;
    }
    #skip-btn:hover { background: #9b59b6; color: #fff; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <h1>234 Player Games</h1>
    <p>50 games · 215 free skins · up to 6 players</p>
    <button id="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      Sign in with Google
    </button>
    <button id="skip-btn">Play as Guest</button>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
