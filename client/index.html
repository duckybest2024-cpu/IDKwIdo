<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>234 Player Games — Mega Edition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0533; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #game-container { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }

    #login-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #2d0b5e 0%, #1a0533 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 20px;
    }
    #login-overlay h1 { color: #fff; font-size: 3rem; font-weight: 900; text-shadow: 0 4px 20px #9b59b6; }
    #login-overlay p  { color: #c39bd3; font-size: 1.1rem; }

    #github-btn {
      display: flex; align-items: center; gap: 12px;
      background: #24292f; color: #fff; border: none; border-radius: 50px;
      padding: 14px 32px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform .15s, background .15s;
      text-decoration: none;
    }
    #github-btn:hover { transform: scale(1.05); background: #3d444d; }
    #github-btn svg   { width: 26px; height: 26px; fill: #fff; flex-shrink: 0; }

    #skip-btn {
      background: transparent; color: #9b59b6; border: 2px solid #9b59b6;
      border-radius: 50px; padding: 10px 28px; font-size: 1rem; cursor: pointer;
      transition: all .15s;
    }
    #skip-btn:hover { background: #9b59b6; color: #fff; }

    #auth-error {
      background: #c0392b; color: #fff; padding: 10px 24px;
      border-radius: 8px; font-size: 0.95rem; display: none;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="login-overlay">
    <h1>234 Player Games</h1>
    <p>50 games &middot; 215 free skins &middot; up to 6 players</p>

    <div id="auth-error"></div>

    <a id="github-btn" href="/api/auth/github">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577
          0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755
          -1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236
          1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466
          -1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176
          0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405
          2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23
          1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22
          0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295
          24 12c0-6.63-5.37-12-12-12"/>
      </svg>
      Sign in with GitHub
    </a>

    <button id="skip-btn">Play as Guest</button>
  </div>

  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
