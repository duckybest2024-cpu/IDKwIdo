function btn(sc,x,y,txt,col,cb,w=200,h=50){
  const b=sc.add.rectangle(x,y,w,h,col).setInteractive({useHandCursor:true});
  sc.add.text(x,y,txt,{font:`bold ${h>44?20:16}px Arial`,color:'#fff'}).setOrigin(0.5);
  b.on('pointerover',()=>b.setAlpha(0.8));b.on('pointerout',()=>b.setAlpha(1));b.on('pointerdown',cb);
  return b;
}
function winScr(sc,msg){
  const{width:W,height:H}=sc.cameras.main;
  sc.add.rectangle(W/2,H/2,520,210,0x1a0533,0.95).setDepth(20);
  sc.add.text(W/2,H/2-35,msg,{font:'bold 54px Arial',color:'#f1c40f'}).setOrigin(0.5).setDepth(21);
  const b=sc.add.rectangle(W/2,H/2+60,200,46,0x8e44ad).setInteractive({useHandCursor:true}).setDepth(21);
  sc.add.text(W/2,H/2+60,'MAIN MENU',{font:'bold 18px Arial',color:'#fff'}).setOrigin(0.5).setDepth(22);
  b.on('pointerdown',()=>sc.scene.start('MM'));
}

class Boot extends Phaser.Scene{
  constructor(){super('Boot');}
  create(){
    const g=this.make.graphics({x:0,y:0,add:false});
    const mk=(k,fn,w,h)=>{g.clear();fn(g);g.generateTexture(k,w,h);};
    mk('card',g=>g.fillStyle(0x3d1266).fillRoundedRect(0,0,150,110,10).lineStyle(2,0x6c3483).strokeRoundedRect(0,0,150,110,10),150,110);
    mk('csel',g=>g.fillStyle(0x6c3483).fillRoundedRect(0,0,150,110,10).lineStyle(3,0xf1c40f).strokeRoundedRect(0,0,150,110,10),150,110);
    mk('coin',g=>g.fillStyle(0xf1c40f).fillCircle(14,14,13),28,28);
    mk('ball',g=>g.fillStyle(0xffffff).fillCircle(14,14,13).lineStyle(2,0x333333).strokeCircle(14,14,13),28,28);
    mk('bomb',g=>g.fillStyle(0x212121).fillCircle(14,12,12).fillStyle(0xff6b35).fillRect(11,0,4,8),28,24);
    mk('shell',g=>g.fillStyle(0xf1c40f).fillRect(0,3,18,7).fillStyle(0xe67e22).fillTriangle(18,0,18,13,26,6),26,13);
    mk('csm',g=>g.fillStyle(0xf1c40f).fillCircle(10,10,9),20,20);
    mk('tank',g=>g.fillStyle(0x5d6d7e).fillRect(0,6,56,26).fillRect(8,0,40,14).lineStyle(1,0x85929e).strokeRect(0,6,56,26),56,32);
    ['red','blue','green','yellow'].forEach((c,i)=>{
      mk('p_'+c,g=>g.fillStyle(PC[i]).fillCircle(18,18,17).lineStyle(3,0xffffff).strokeCircle(18,18,17),36,36);
    });
    g.destroy();
    this.scene.start('MM');
  }
}

      const s=this.add.circle(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),Phaser.Math.FloatBetween(1,2.5),0xffffff,Phaser.Math.FloatBetween(0.3,1));
      this.tweens.add({targets:s,alpha:0.05,duration:Phaser.Math.Between(800,2500),yoyo:true,repeat:-1,delay:Phaser.Math.Between(0,2000)});
    }
    const t=this.add.text(W/2,110,'2  3  4',{font:'bold 100px Arial',color:'#fff',stroke:'#9b59b6',strokeThickness:6}).setOrigin(0.5);
    this.add.text(W/2,210,'PLAYER GAMES',{font:'bold 54px Arial',color:'#f39c12',stroke:'#d35400',strokeThickness:4}).setOrigin(0.5);
    this.add.text(W/2,268,'MEGA EDITION',{font:'bold 26px Arial',color:'#9b59b6'}).setOrigin(0.5);
    this.add.text(W/2,308,'50 GAMES  ·  215 FREE SKINS  ·  UP TO 4 PLAYERS',{font:'17px Arial',color:'#c39bd3'}).setOrigin(0.5);

    [[1,W/2-280,0xe74c3c],[2,W/2-80,0x3498db],[3,W/2+80,0x2ecc71],[4,W/2+280,0xf1c40f]].forEach(([n,x,c])=>{
      const b=this.add.rectangle(x,420,160,88,c).setInteractive({useHandCursor:true});
      this.add.text(x,420,n+'\nPLAYER'+(n>1?'S':''),{font:'bold 22px Arial',color:'#fff',align:'center'}).setOrigin(0.5);
      b.on('pointerover',()=>b.setScale(1.07));b.on('pointerout',()=>b.setScale(1));

class SK extends Phaser.Scene{
  constructor(){super('SK');}
  init(){this.sel=localStorage.getItem('skin')||'cat_white';this.cat='animals';this.foc=null;}
  create(){
    const W=1280,H=720;
    this.add.rectangle(0,0,W,H,0x1a0533).setOrigin(0);
    this.add.text(W/2,36,'SELECT YOUR SKIN',{font:'bold 36px Arial',color:'#fff'}).setOrigin(0.5);
    this.add.text(W/2,68,SKINS.length+' skins — all free',{font:'15px Arial',color:'#c39bd3'}).setOrigin(0.5);
    const cats=Object.keys(CATS);
    this.tabs=cats.map((cat,i)=>{
      const x=80+i*120,col=CATS[cat].c;
      const tab=this.add.rectangle(x,108,112,30,col,i===0?1:0.5).setInteractive({useHandCursor:true});
      this.add.text(x,108,cat.toUpperCase(),{font:'bold 9px Arial',color:'#fff'}).setOrigin(0.5);
      tab.on('pointerdown',()=>{this.cat=cat;this.tabs.forEach((t,j)=>t.setAlpha(j===i?1:0.5));this._rend();});
      return tab;
    });
    this.cont=this.add.container(0,0);
    const px=W-200,py=H/2;
    this.add.rectangle(px,py,360,360,0x2d0b5e).setStrokeStyle(2,0x9b59b6);
    this.pvc=this.add.circle(px,py-60,48,0xaaa);
    this.pvl=this.add.text(px,py-60,'?',{font:'bold 38px Arial',color:'#fff'}).setOrigin(0.5);
    this.pvn=this.add.text(px,py+10,'',{font:'bold 18px Arial',color:'#fff'}).setOrigin(0.5);
    btn(this,px,py+90,'USE SKIN',0x27ae60,()=>{if(this.foc){localStorage.setItem('skin',this.foc);this.sel=this.foc;this._rend();}},160,42);
    btn(this,80,H-36,'BACK',0x6c3483,()=>this.scene.start('MM'),130,42);
    this._rend();this._foc(this.sel);
  }
  _rend(){
    this.cont.removeAll(true);
    CATS[this.cat].s.forEach((id,i)=>{
      const col=i%6,row=Math.floor(i/6);
      const x=32+col*166+75,y=134+row*118+50;
      const bg=this.add.image(x,y,id===this.sel?'csel':'card').setInteractive({useHandCursor:true});
      const ci=this.add.circle(x,y-18,22,CATS[this.cat].c);
      const lt=this.add.text(x,y-18,id[0].toUpperCase(),{font:'bold 18px Arial',color:'#fff'}).setOrigin(0.5);
      const nm=this.add.text(x,y+22,id.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),{font:'8px Arial',color:'#fff',wordWrap:{width:140}}).setOrigin(0.5);
      bg.on('pointerdown',()=>this._foc(id));
      bg.on('pointerover',()=>bg.setScale(1.05));bg.on('pointerout',()=>bg.setScale(1));
      this.cont.add([bg,ci,lt,nm]);
    });
  }
  _foc(id){
    this.foc=id;
    const s=SKINS.find(s=>s.id===id);if(!s)return;
    this.pvc.setFillStyle(s.c);this.pvl.setText(id[0].toUpperCase());this.pvn.setText(s.name);
  }
}

class GS extends Phaser.Scene{
  constructor(){super('GS');}
  init(d){this.p=d?.p||2;this.page=0;}
  create(){
    const W=1280,H=720;
    this.add.rectangle(0,0,W,H,0x1a0533).setOrigin(0);
    this.add.text(W/2,36,'CHOOSE A GAME',{font:'bold 34px Arial',color:'#fff'}).setOrigin(0.5);
    this.add.text(W/2,68,this.p+' player'+(this.p>1?'s':'')+' · '+GAMES.length+' games',{font:'16px Arial',color:'#c39bd3'}).setOrigin(0.5);
    this.cont=this.add.container(0,0);
    this.pt=this.add.text(W/2,H-34,'',{font:'15px Arial',color:'#c39bd3'}).setOrigin(0.5);
    btn(this,W/2-120,H-34,'< PREV',0x6c3483,()=>{if(this.page>0){this.page--;this._rend();}},120,40);
    btn(this,W/2+120,H-34,'NEXT >',0x6c3483,()=>{if((this.page+1)*15<GAMES.length){this.page++;this._rend();}},120,40);
    btn(this,80,H-34,'BACK',0x6c3483,()=>this.scene.start('MM'),120,40);
    this._rend();
  }
  _rend(){
    this.cont.removeAll(true);
    const pg=GAMES.slice(this.page*15,(this.page+1)*15);
    const W=1280,cols=5,cW=212,cH=134,pX=18,pY=14;
    const sx=(W-(cols*(cW+pX)-pX))/2;
    pg.forEach((g,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const x=sx+col*(cW+pX)+cW/2,y=100+row*(cH+pY)+cH/2;
      const av=!!g.scene;
      const bg=this.add.rectangle(x,y,cW,cH,av?0x2d0b5e:0x180924).setStrokeStyle(2,av?0x8e44ad:0x333333);
      if(av)bg.setInteractive({useHandCursor:true});
      this.add.text(x,y-18,g.name,{font:'bold '+(g.name.length>13?12:14)+'px Arial',color:av?'#fff':'#555',wordWrap:{width:200}}).setOrigin(0.5);
      const tc=TC[g.tag]||0x555;
      this.add.rectangle(x,y+24,g.tag.length*9+12,18,tc,av?1:0.25);
      this.add.text(x,y+24,g.tag.toUpperCase(),{font:'8px Arial',color:'#fff'}).setOrigin(0.5);
      if(!av)this.add.text(x,y+44,'COMING SOON',{font:'9px Arial',color:'#444'}).setOrigin(0.5);
      if(av){
        bg.on('pointerover',()=>{bg.setFillColor(0x4a1a8a);bg.setScale(1.03);});
        bg.on('pointerout',()=>{bg.setFillColor(0x2d0b5e);bg.setScale(1);});
        bg.on('pointerdown',()=>this.scene.start(g.scene,{p:this.p}));
      }
      this.cont.add([bg]);
    });
    this.pt.setText((this.page+1)+' / '+Math.ceil(GAMES.length/15));
  }
}

class BR extends Phaser.Scene{
  constructor(){super('BR');}
  init(d){this.pc=d?.p||2;this.over=false;}
  create(){
    const W=1280,H=720;
    this.physics.world.setBounds(0,0,W,H);
    this.add.rectangle(0,0,W,H,0x1a5e1a).setOrigin(0);
    this.obs=this.physics.add.staticGroup();
    [[200,200],[450,160],[720,300],[950,200],[300,460],[620,510],[1020,400],[160,560],[820,560],[500,360],[1100,260]].forEach(([x,y])=>{
      const o=this.add.rectangle(x,y,80,80,0x5d4037);this.obs.add(o);this.physics.add.existing(o,true);
    });
    const sp=[[100,80],[W-100,80],[100,H-80],[W-100,H-80]];
    this.ps=[];this.hp=[3,3,3,3];this.ht=[];
    for(let i=0;i<this.pc;i++){
      const p=this.physics.add.image(sp[i][0],sp[i][1],'p_'+['red','blue','green','yellow'][i]).setCollideWorldBounds(true);
      p.setData({i,sp:220,cd:0,alive:true});this.physics.add.collider(p,this.obs);this.ps.push(p);
      this.ht.push(this.add.text(20+i*220,24,'P'+(i+1)+' ❤❤❤',{font:'bold 16px Arial',color:'#fff'}).setDepth(10));
    }
    for(let a=0;a<this.ps.length;a++)for(let b=a+1;b<this.ps.length;b++)this.physics.add.collider(this.ps[a],this.ps[b]);
    this.buls=this.physics.add.group({maxSize:40});
    this.ps.forEach((p,pi)=>this.physics.add.overlap(this.buls,p,(bl)=>{
      if(!bl.active||bl.getData('o')===pi)return;
      bl.setActive(false).setVisible(false);this._hit(pi);
    }));
    this.zR=Math.min(W,H)/2-30;this.zX=W/2;this.zY=H/2;
    this.zG=this.add.graphics().setDepth(5);
    this.zC=30;
    this.zT=this.add.text(W/2,22,'Zone shrinks in 30s',{font:'bold 17px Arial',color:'#e74c3c'}).setOrigin(0.5).setDepth(10);
    this.time.addEvent({delay:1000,loop:true,callback:()=>{
      if(this.over)return;this.zC--;this.zT.setText('Zone shrinks in '+Math.max(0,this.zC)+'s');

  _fin(i){if(this.fin.includes(i))return;this.fin.push(i);const place=['1ST','2ND','3RD','4TH'][this.fin.length-1];const{width:W}=this.cameras.main;this.add.text(W/2,120+this.fin.length*52,'P'+(i+1)+' — '+place+'!',{font:'bold 38px Arial',color:'#f1c40f'}).setOrigin(0.5).setScrollFactor(0).setDepth(20);if(this.fin.length>=this.pc){this.over=true;const b=this.add.rectangle(W/2,560,200,44,0x8e44ad).setInteractive({useHandCursor:true}).setScrollFactor(0).setDepth(21);this.add.text(W/2,560,'MAIN MENU',{font:'bold 18px Arial',color:'#fff'}).setOrigin(0.5).setScrollFactor(0).setDepth(22);b.on('pointerdown',()=>{this.physics.world.gravity.y=0;this.scene.start('MM');});}}
}

try{
  new Phaser.Game({
    type:Phaser.AUTO,
    width:1280,height:720,
    parent:'g',
    backgroundColor:'#1a0533',
    scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
    physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
    scene:[Boot,MM,SK,GS,BR,SC,TB,BG,PR],
  });
}catch(e){
  window.showErr?.('Init failed: '+(e?.message||e));
}
