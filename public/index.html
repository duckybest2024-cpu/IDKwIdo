<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>234 Player Games — Mega Edition</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#1a0533; overflow:hidden; }
    #game-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    canvas { display:block; }

    #load-screen {
      position:fixed; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#1a0533; color:#fff; font-family:Arial,sans-serif; z-index:999;
    }
    #load-title { font-size:clamp(24px,7vw,52px); font-weight:bold; color:#f39c12; margin-bottom:10px; letter-spacing:6px; }
    #load-sub   { font-size:clamp(13px,3.5vw,20px); color:#c39bd3; }
    #load-dots  { display:inline-block; width:2em; text-align:left; }

    #err-box {
      position:fixed; inset:0;
      display:none; flex-direction:column; align-items:center; justify-content:center;
      background:#1a0533; padding:24px; z-index:1000; font-family:monospace;
    }
    #err-box h2 { color:#e74c3c; font-size:clamp(18px,5vw,26px); margin-bottom:14px; }
    #err-box p  { color:#fff; font-size:clamp(11px,3vw,14px); word-break:break-all; text-align:center; max-width:90vw; line-height:1.6; }
    #err-box small { color:#9b59b6; margin-top:14px; display:block; }
  </style>
</head>
<body>
  <div id="load-screen">
    <div id="load-title">2 · 3 · 4</div>
    <div id="load-sub">PLAYER GAMES &mdash; Loading<span id="load-dots">...</span></div>
  </div>
  <div id="err-box">
    <h2>&#9888; Failed to start</h2>
    <p id="err-msg"></p>
    <small>Try refreshing. If this keeps happening, open DevTools &rarr; Console.</small>
  </div>
  <div id="game-container"></div>

  <script>
    // Animate the dots
    var _d=0,_dot=document.getElementById('load-dots');
    setInterval(function(){_d=(_d+1)%4;_dot.textContent='.'.repeat(_d);},400);

    window.showErr = function(msg) {
      document.getElementById('load-screen').style.display = 'none';
      var b = document.getElementById('err-box');
      b.style.display = 'flex';
      document.getElementById('err-msg').textContent = msg;
    };
    window.hideLoading = function() {
      document.getElementById('load-screen').style.display = 'none';
    };
    window.onerror = function(msg, src, line) {
      window.showErr(msg + '\n\n' + (src ? src.split('/').pop() : '') + (line ? ' line ' + line : ''));
      return false;
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"
          onerror="window.showErr('Phaser CDN failed to load.\nCheck your internet connection.\n\nhttps://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js')"></script>
  <script src="/socket.io/socket.io.js" onerror="console.warn('socket.io offline')"></script>
  <script src="game.js"></script>
</body>
</html>
